services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: support
      POSTGRES_PASSWORD: support
      POSTGRES_DB: support_agent
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support -d support_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://support:support@postgres:5432/support_agent
      MOCK_LLM: "true"
      API_KEYS: "cust_456:staging-key-cust456"
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      REDIS_URL: redis://redis:6379/0
      ADMIN_API_KEY: staging-admin-key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
