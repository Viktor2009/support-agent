name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff
        run: ruff check app tests

      - name: Pytest with coverage
        run: pytest -v --cov=app --cov-report=term-missing --cov-fail-under=80
        env:
          MOCK_LLM: "true"

      - name: Golden dataset eval
        run: python tests/eval/run_eval.py
        env:
          MOCK_LLM: "true"

  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install pip-audit

      - name: pip audit
        run: pip-audit -r requirements.txt

  loadtest:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Start API server
        run: |
          MOCK_LLM=true uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          echo $! > server.pid
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health && exit 0
            sleep 1
          done
          echo "Server failed to start"
          exit 1

      - name: Load test (50 concurrent sessions)
        run: python scripts/load_test.py --url http://127.0.0.1:8000 --concurrency 50
        env:
          MOCK_LLM: "true"

      - name: Stop server
        if: always()
        run: kill "$(cat server.pid)" 2>/dev/null || true
