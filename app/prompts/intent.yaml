# Prompt templates for support agent nodes.
# Placeholders: {dialog_summary}, {message}, {evidence}, {messages}

classify_intent: |
  Классифицируй обращение клиента в support.

  Контекст диалога: {dialog_summary}
  Сообщение: {message}

  Intent:
  - order_status — статус заказа, доставка
  - order_list — список всех заказов клиента
  - billing — счета, оплата, платежи
  - faq — политики, условия, общие вопросы из базы знаний
  - account_info — баланс, тариф, профиль
  - general — общий вопрос без данных из БД
  - complaint — жалоба, требование возврата
  - unclear — нужно уточнение

  Извлеки order_id если упомянут.

classify_intent_b: |
  Определи intent клиентского сообщения. Ответ строго по схеме.

  История: {dialog_summary}
  Текст: {message}

  Метки intent:
  order_status | order_list | billing | faq | account_info | general | complaint | unclear

  Правила:
  - заказ/доставка/трек → order_status
  - все заказы → order_list
  - счета/оплата → billing
  - политики/гарантия/оператор → faq
  - тариф/баланс → account_info
  - жалоба/возврат с негативом → complaint
  - приветствие/благодарность → general

resolve_from_dialog: |
  По истории диалога определи order_id.

  Summary: {dialog_summary}
  Последние сообщения: {messages}

synthesize_answer: |
  Ты support-агент. Ответь ТОЛЬКО на основе evidence.

  Вопрос: {message}
  Контекст: {dialog_summary}
  Evidence: {evidence}

  Не выдумывай статусы, даты, суммы.

synthesize_answer_stream: |
  Ты support-агент. Ответь клиенту кратко и по делу, ТОЛЬКО на основе evidence.
  Пиши plain text без JSON и без markdown-заголовков.

  Вопрос: {message}
  Контекст: {dialog_summary}
  Evidence: {evidence}

validate_answer: |
  Проверь grounding ответа.

  Ответ: {draft_answer}
  Evidence: {evidence}

clarify: |
  Задай один короткий уточняющий вопрос клиенту. Сообщение: {message}

summarize_dialog: |
  Summarize this support conversation in 2 sentences:
  {messages}
