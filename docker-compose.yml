services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: support
      POSTGRES_PASSWORD: support
      POSTGRES_DB: support_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support -d support_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
